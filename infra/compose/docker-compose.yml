services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-roadviz}
      POSTGRES_USER: ${POSTGRES_USER:-roadviz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadviz_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roadviz} -d ${POSTGRES_DB:-roadviz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://roadviz:roadviz_dev_password@db:5432/roadviz}
    working_dir: /app/apps/api
    volumes:
      - ../../apps/api:/app/apps/api
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    working_dir: /app/apps/web
    volumes:
      - ../../apps/web:/app/apps/web
      - ../../package.json:/app/package.json:ro
      - ../../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - web_node_modules:/app/apps/web/node_modules
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
